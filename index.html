<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人网站</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="site-shell">
    <div class="site-bg site-bg-main"></div>

    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">YU</span>
        <div>
          <p class="eyebrow">Personal Research Site</p>
          <h1 id="nav-name">个人网站</h1>
        </div>
      </div>

      <nav class="topnav">
        <a href="#about">关于</a>
        <a href="#research">研究</a>
        <a href="#projects">项目</a>
        <a href="#publications">成果</a>
        <a href="#contact">联系</a>
        <a class="admin-link" href="admin.html">后台维护</a>
      </nav>
    </header>

    <main class="page-grid">
      <section class="hero card reveal">
        <div class="hero-copy">
          <p class="eyebrow">Researcher / Engineer / Builder</p>
          <h2 id="hero-name">你的名字</h2>
          <p class="hero-role" id="hero-role">你的研究方向</p>
          <p class="hero-tagline" id="hero-tagline">
            这是你的个人简介和研究重点说明。
          </p>

          <div class="hero-actions">
            <a class="button button-primary" href="#projects">查看项目</a>
            <a class="button button-secondary" href="#contact">联系我</a>
          </div>
        </div>

        <aside class="hero-panel">
          <p class="panel-label">研究概览</p>
          <p class="hero-intro" id="hero-intro"></p>
          <div class="meta-list">
            <div>
              <span>地区</span>
              <strong id="meta-location"></strong>
            </div>
            <div>
              <span>邮箱</span>
              <strong id="meta-email"></strong>
            </div>
            <div>
              <span>主页</span>
              <strong id="meta-website"></strong>
            </div>
          </div>
        </aside>
      </section>

      <section class="stats reveal" id="stats"></section>

      <section class="card section reveal" id="about">
        <div class="section-head">
          <p class="eyebrow">About</p>
          <h3>关于我</h3>
        </div>
        <p class="section-summary" id="about-summary"></p>
        <div class="bullet-grid" id="about-points"></div>
      </section>

      <section class="card section reveal" id="research">
        <div class="section-head">
          <p class="eyebrow">Research Areas</p>
          <h3>研究方向</h3>
        </div>
        <div class="stack-list" id="research-list"></div>
      </section>

      <section class="card section reveal" id="projects">
        <div class="section-head">
          <p class="eyebrow">Featured Work</p>
          <h3>项目与实践</h3>
        </div>
        <div class="project-grid" id="project-list"></div>
      </section>

      <section class="card section reveal" id="publications">
        <div class="section-head">
          <p class="eyebrow">Outputs</p>
          <h3>论文与成果</h3>
        </div>
        <div class="stack-list" id="publication-list"></div>
      </section>

      <section class="card section reveal" id="contact">
        <div class="section-head">
          <p class="eyebrow">Contact</p>
          <h3>联系我</h3>
        </div>
        <div class="contact-panel">
          <div class="contact-card">
            <span>邮箱</span>
            <strong id="contact-email"></strong>
          </div>
          <div class="contact-card">
            <span>微信 / 其他</span>
            <strong id="contact-wechat"></strong>
          </div>
          <div class="contact-card">
            <span>所在地区</span>
            <strong id="contact-location"></strong>
          </div>
        </div>
        <p class="contact-note" id="contact-note"></p>
      </section>
    </main>

    <footer class="footer">
      <p>这个网站支持通过 <a href="admin.html">后台维护页</a> 直接修改内容。</p>
    </footer>

    <script src="storage.js"></script>
    <script src="app.js"></script>
  </body>
</html>
